name: Test

on:
  push:
    branches: [main, heatmap-fix]
    paths:
      - 'Consulta_ISP/agentes-sistema/**'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'Consulta_ISP/agentes-sistema/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Consulta_ISP/agentes-sistema
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Consulta_ISP/agentes-sistema/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test
        env:
          NODE_ENV: test
