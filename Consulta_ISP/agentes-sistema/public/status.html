<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Status - Consulta ISP</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif;background:#0f172a;color:#e2e8f0;padding:20px;margin:0;line-height:1.5}
.wrap{max-width:900px;margin:0 auto}
h1{color:#60a5fa;border-bottom:2px solid #1e293b;padding-bottom:10px}
.card{background:#1e293b;border-radius:8px;padding:16px;margin:12px 0;border-left:4px solid #64748b}
.card.ok{border-left-color:#34d399}
.card.err{border-left-color:#f87171}
.card.warn{border-left-color:#fbbf24}
.k{color:#94a3b8;font-size:.85rem}
.v{color:#fff;font-weight:600;font-family:monospace;font-size:.9rem;word-break:break-all}
button{background:#3b82f6;color:#fff;border:0;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:.95rem;margin:4px 4px 4px 0}
button:hover{background:#2563eb}
pre{background:#0f172a;padding:12px;border-radius:6px;overflow:auto;font-size:.8rem;max-height:400px;color:#a7f3d0}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.72rem;font-weight:600;margin-left:6px}
.tag.ok{background:#065f46;color:#a7f3d0}
.tag.err{background:#7f1d1d;color:#fecaca}
</style>
</head>
<body>
<div class="wrap">
<h1>Status do Sistema - Consulta ISP</h1>
<p class="k">Pagina estatica de diagnostico. Se voce esta lendo isto, o Express esta servindo arquivos estaticos corretamente.</p>

<div class="card ok">
<div class="k">Arquivo carregado:</div>
<div class="v">/status.html</div>
<div class="k" style="margin-top:8px">Horario do browser:</div>
<div class="v" id="clock">-</div>
</div>

<h2 style="color:#fbbf24">Testes interativos</h2>
<div>
<button onclick="testHealth()">Testar /api/health</button>
<button onclick="testDiagnose()">Rodar /api/diagnose (completo)</button>
<button onclick="testStats()">Testar /api/stats</button>
<button onclick="testIndex()">Baixar / (index.html) raw</button>
<button onclick="location.href='/'">Ir para Dashboard</button>
</div>

<div id="results"></div>

<script>
function tag(ok){return '<span class="tag '+(ok?'ok':'err')+'">'+(ok?'OK':'ERRO')+'</span>'}
function render(title,ok,data,extra){
  const div=document.createElement('div');
  div.className='card '+(ok?'ok':'err');
  div.innerHTML='<h3 style="margin:0 0 8px 0">'+title+tag(ok)+'</h3>'+(extra||'')+'<pre>'+JSON.stringify(data,null,2)+'</pre>';
  document.getElementById('results').prepend(div);
}
function renderText(title,ok,text){
  const div=document.createElement('div');
  div.className='card '+(ok?'ok':'err');
  div.innerHTML='<h3 style="margin:0 0 8px 0">'+title+tag(ok)+'</h3><pre>'+text.replace(/</g,'&lt;').substring(0,2000)+'</pre>';
  document.getElementById('results').prepend(div);
}
async function testHealth(){
  try{const r=await fetch('/api/health');const d=await r.json();render('GET /api/health',r.ok,d);}
  catch(e){render('GET /api/health',false,{error:e.message});}
}
async function testDiagnose(){
  try{const r=await fetch('/api/diagnose');const d=await r.json();const hasProblem=d.summary&&d.summary.failed>0;
    const htmlStatus=d.checks&&d.checks.index_html?d.checks.index_html.status:'n/a';
    const extra='<div class="k">Index.html status: <b style="color:'+(htmlStatus==='ok'?'#34d399':'#f87171')+'">'+htmlStatus+'</b></div>';
    render('GET /api/diagnose',!hasProblem,d,extra);}
  catch(e){render('GET /api/diagnose',false,{error:e.message});}
}
async function testStats(){
  try{const r=await fetch('/api/stats');const d=await r.json();render('GET /api/stats',r.ok,d);}
  catch(e){render('GET /api/stats',false,{error:e.message});}
}
async function testIndex(){
  try{const r=await fetch('/');const t=await r.text();
    const escapadas=(t.match(/<\\!--/g)||[]).length;
    const comentarios=(t.match(/<!--/g)||[]).length;
    const ok=escapadas===0;
    renderText('GET / (primeiros 2KB)',ok,'Tamanho: '+t.length+' bytes\nComentarios HTML: '+comentarios+'\nComentarios escapados (erro): '+escapadas+'\n\n---\n'+t);}
  catch(e){renderText('GET /',false,e.message);}
}
function tick(){document.getElementById('clock').textContent=new Date().toISOString()}
tick();setInterval(tick,1000);
</script>
</body>
</html>
