<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Login — Consulta ISP CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:opsz,wght@6..72,500&display=swap" rel="stylesheet">
<style>
/* Claude design system (skill: design > claude.md) — warm parchment + serif */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter','SF Pro Display',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
:root{
  --bg:#f5f4ed;          /* Parchment */
  --bg2:#faf9f5;         /* Ivory */
  --card:#ffffff;        /* Pure White */
  --border:#f0eee6;      /* Border Cream */
  --border-warm:#e8e6dc;
  --text:#141413;        /* Near Black */
  --text-secondary:#4d4c48; /* Charcoal Warm */
  --muted:#5e5d59;       /* Olive Gray */
  --terracotta:#c96442;  /* Terracotta Brand */
  --coral:#d97757;
  --green:#5b7c5e;
  --red:#b53333;         /* Error Crimson */
  --yellow:#b8923a;
  --focus-blue:#3898ec;
}
*:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(56,152,236,.35);border-radius:8px}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation-duration:.01ms !important;transition-duration:.01ms !important}}
body{
  background:var(--bg); /* Parchment */
  color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  line-height:1.60;
}
.card{
  background:var(--card); /* Pure White */
  border:1px solid var(--border); /* Border Cream */
  border-radius:24px;
  padding:48px 40px;width:100%;max-width:440px;
  box-shadow:rgba(0,0,0,0.05) 0px 4px 24px, 0 0 0 1px var(--border-warm);
}
.logo{
  font-family:'Newsreader','Anthropic Serif',Georgia,serif;
  font-size:2rem;font-weight:500;line-height:1.10;
  color:var(--text); /* Near Black */
  margin-bottom:8px;
}
.subtitle{color:var(--muted);font-size:.95rem;margin-bottom:32px;line-height:1.60}
.field{margin-bottom:18px}
.field label{display:block;font-size:.78rem;color:var(--muted);margin-bottom:8px;letter-spacing:.5px;font-weight:500;text-transform:uppercase}
.field input{
  width:100%;padding:12px 14px;
  background:var(--bg2);
  border:1px solid var(--border-warm);
  border-radius:12px;
  color:var(--text);font-size:.95rem;font-family:'JetBrains Mono',monospace;
  transition:border-color .2s, box-shadow .2s;
}
.field input::placeholder{color:var(--quaternary,#87867f)}
.field input:focus{outline:none;border-color:var(--focus-blue);box-shadow:0 0 0 3px rgba(56,152,236,.18)}
.btn{
  width:100%;padding:14px;
  background:var(--terracotta); /* Terracotta Brand — primary CTA */
  color:#faf9f5; /* Ivory */
  border:none;border-radius:12px;
  font-size:.95rem;font-weight:600;cursor:pointer;
  box-shadow:0 0 0 1px var(--terracotta);
  transition:background .2s, transform .15s, box-shadow .2s;
  letter-spacing:-0.01em;
}
.btn:hover{background:#b85531;box-shadow:0 0 0 1px #b85531, rgba(0,0,0,0.05) 0px 4px 12px}
.btn:active{transform:scale(0.98)}
.btn:disabled{opacity:.6;cursor:wait;transform:none}
.error{margin-top:14px;padding:12px 14px;background:rgba(181,51,51,.06);color:var(--red);border:1px solid rgba(181,51,51,.25);border-radius:8px;font-size:.85rem;display:none}
.error.show{display:block}
.success{margin-top:14px;padding:12px 14px;background:rgba(91,124,94,.08);color:var(--green);border:1px solid rgba(91,124,94,.25);border-radius:8px;font-size:.85rem;display:none}
.success.show{display:block}
.hint{margin-top:32px;padding-top:24px;border-top:1px solid var(--border);font-size:.78rem;color:var(--muted);line-height:1.65}
.hint code{background:var(--bg);padding:3px 7px;border-radius:6px;color:var(--text-secondary);font-size:.72rem;font-family:'JetBrains Mono',monospace;border:1px solid var(--border-warm)}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin-right:8px;vertical-align:-2px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Consulta ISP</div>
  <div class="subtitle">CRM &amp; Agentes IA — Acesso restrito</div>

  <form id="login-form" autocomplete="off">
    <div class="field">
      <label for="password">Senha de acesso</label>
      <input type="password" id="password" name="password" autocomplete="current-password"
             placeholder="LOGIN_PASSWORD ou API_AUTH_TOKEN" required autofocus minlength="1" maxlength="256">
    </div>
    <button type="submit" class="btn" id="submit-btn">Entrar</button>
    <div id="error-msg" class="error"></div>
    <div id="success-msg" class="success"></div>
  </form>

  <div class="hint">
    Esqueceu a senha? Pegue na VPS:<br>
    <code>grep "^LOGIN_PASSWORD\|^API_AUTH_TOKEN" /opt/consulta-isp-agentes/.env</code>
    <br><br>
    Acesso aceita <strong>LOGIN_PASSWORD</strong> (memorivel) ou o proprio <strong>API_AUTH_TOKEN</strong> (64 chars).
  </div>
</div>

<script>
// Limpa service workers antigos da aplicacao Consulta ISP principal
// (causa loop infinito de /api/config/maps-key — ver Sprint 4 hotfix).
(async function cleanupAncientWorkers(){
  try {
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      for (const reg of regs) {
        await reg.unregister();
        console.log('[LOGIN] SW unregistered:', reg.scope);
      }
    }
    if ('caches' in window) {
      const keys = await caches.keys();
      for (const k of keys) await caches.delete(k);
    }
  } catch (e) { console.warn('[LOGIN] cleanup failed:', e.message); }
})();

// Se ja tem token valido no localStorage, valida e redireciona
(async function autoLogin(){
  const tok = localStorage.getItem('api_token');
  if (!tok) return;
  try {
    const r = await fetch('/api/auth/check', { headers: { 'Authorization': 'Bearer ' + tok } });
    if (r.ok) {
      showSuccess('Sessao ativa. Redirecionando...');
      setTimeout(() => location.href = '/', 600);
    }
  } catch {}
})();

const form = document.getElementById('login-form');
const btn = document.getElementById('submit-btn');
const errorEl = document.getElementById('error-msg');
const successEl = document.getElementById('success-msg');

function showError(msg){
  errorEl.textContent = msg;
  errorEl.classList.add('show');
  successEl.classList.remove('show');
}
function showSuccess(msg){
  successEl.textContent = msg;
  successEl.classList.add('show');
  errorEl.classList.remove('show');
}

form.addEventListener('submit', async (ev) => {
  ev.preventDefault();
  errorEl.classList.remove('show');
  successEl.classList.remove('show');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Validando...';

  const password = document.getElementById('password').value;

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password }),
    });

    if (r.status === 429) {
      showError('Muitas tentativas. Aguarde 15 minutos e tente novamente.');
      btn.disabled = false;
      btn.textContent = 'Entrar';
      return;
    }

    if (!r.ok) {
      const body = await r.json().catch(() => ({}));
      showError(body.error === 'invalid_credentials'
        ? 'Senha incorreta'
        : 'Erro: ' + (body.error || r.status));
      btn.disabled = false;
      btn.textContent = 'Entrar';
      return;
    }

    const data = await r.json();
    if (!data.token) {
      showError('Resposta invalida do servidor');
      btn.disabled = false;
      btn.textContent = 'Entrar';
      return;
    }

    localStorage.setItem('api_token', data.token);
    showSuccess('Login OK! Redirecionando...');
    setTimeout(() => location.href = '/', 500);

  } catch (err) {
    showError('Falha de rede: ' + err.message);
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
});
</script>
</body>
</html>
