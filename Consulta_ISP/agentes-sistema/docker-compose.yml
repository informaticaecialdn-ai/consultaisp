version: '3.8'

services:
  agentes:
    build: .
    container_name: consulta-isp-agentes
    command: ["node", "src/server.js"]
    expose:
      - "3001"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./skills-ref:/app/skills-ref:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    build: .
    container_name: consulta-isp-worker
    command: ["node", "src/worker.js"]
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./skills-ref:/app/skills-ref:ro
    restart: unless-stopped
    depends_on:
      - agentes
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9091/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    container_name: caddy-proxy
    depends_on:
      - agentes
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # Litestream — replicacao continua do SQLite (data/agentes.db)
  # ------------------------------------------------------------
  # Desativado por padrao. Ativar no Sprint 1 descomentando o
  # bloco abaixo e preenchendo as LITESTREAM_* no .env.
  # Requer:
  #   1) litestream.yml preenchido (endpoint, bucket, region)
  #   2) Vars no .env: LITESTREAM_B2_BUCKET, *_REGION, *_ENDPOINT,
  #      *_KEY_ID, *_APP_KEY (ou equivalentes AWS)
  #   3) Volume `./data` compartilhado com o container `agentes`
  # Docs: https://litestream.io/guides/docker/
  # ============================================================
  # litestream:
  #   image: litestream/litestream:0.3
  #   container_name: consulta-isp-litestream
  #   depends_on:
  #     - agentes
  #   env_file:
  #     - .env
  #   volumes:
  #     - ./data:/data
  #     - ./litestream.yml:/etc/litestream.yml:ro
  #   command: replicate -config /etc/litestream.yml
  #   restart: unless-stopped
  #   logging:
  #     driver: "json-file"
  #     options:
  #       max-size: "10m"
  #       max-file: "3"

volumes:
  caddy_data:
  caddy_config:
